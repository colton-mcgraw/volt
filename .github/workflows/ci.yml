name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC Build Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure and Build (Bootstrap)
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\windows\bootstrap.ps1

  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            make \
            ninja-build \
            pkg-config \
            libvulkan-dev \
            vulkan-tools \
            xorg-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev

      - name: Configure and Build (Bootstrap)
        run: |
          bash ./scripts/linux/bootstrap.sh
